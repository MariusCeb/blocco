function focusEnterEdit() {
  const arr = focusType === 'prom' ? curProms() : curIdee();
  const it  = arr.find(i => i.id === focusId); if (!it) return;
  _focusIsEdit = true;
  // Popola textarea e titolo
  const bodyEl = document.getElementById('focus-body');
  const ttlInp = document.getElementById('focus-ttl-inp');
  bodyEl.value = it.text;
  if (focusType === 'idee') { ttlInp.value = it.title || ''; ttlInp.style.display = ''; }
  else { ttlInp.style.display = 'none'; }
  // Auto-save con status nel topbar
  const schedAutoSave = () => {
    clearTimeout(autoSaveTimer);
    const st = document.getElementById('focus-status');
    if (st) st.textContent = '·';
    autoSaveTimer = setTimeout(() => {
      doFocusSave(false);
      const st2 = document.getElementById('focus-status');
      if (st2) { st2.textContent = '✓'; setTimeout(() => { if (st2) st2.textContent = ''; }, 1400); }
    }, 300);
  };
  const upd = () => { _updateLineNums(); schedAutoSave(); };
  _updateLineNums();
  bodyEl.oninput = upd;
  bodyEl.onscroll = () => {
    const ln = document.getElementById('focus-lnums');
    if (ln) ln.scrollTop = bodyEl.scrollTop;
  };
  if (focusType === 'idee') ttlInp.oninput = schedAutoSave;
  // Color picker
  focusColor = it.color || null;
  document.getElementById('focus-clr').innerHTML = ['none',...CLRS].map(c => `
    <div class="clrdot${c==='none'?' clrnone':''}${(focusColor||'none')===c?' sel':''}"
      style="${c!=='none'?'background:'+CLRHEX[c]:''}"
      onclick="pickFocusClr('${c}',this)"></div>
  `).join('');
  // Deadline
  const fdInp = document.getElementById('focus-deadline-inp');
  const fdBtn = document.getElementById('focus-deadline-toggle');
  if (it.deadline) {
    fdInp.value = toLocalDatetimeInput(it.deadline);
    fdInp.style.display = ''; fdBtn.textContent = '[on]';
  } else {
    fdInp.value = ''; fdInp.style.display = 'none'; fdBtn.textContent = '[off]';
  }
  _focusShowMode('edit');
  setTimeout(() => bodyEl.focus(), 60);
}

function _focusShowMode(mode) {
  const isEdit = mode === 'edit';
  document.getElementById('focus-view').style.display      = isEdit ? 'none' : '';
  document.getElementById('focus-edit').style.display      = isEdit ? 'flex' : 'none';
  document.getElementById('focus-edit-btn').style.display  = isEdit ? 'none' : '';
  document.getElementById('focus-save-btn').style.display  = isEdit ? '' : 'none';
  document.getElementById('focus-foot-view').style.display = isEdit ? 'none' : 'flex';
  document.getElementById('focus-foot-edit').style.display = isEdit ? 'flex' : 'none';
}

function doFocusSave(shouldClose) {
  const arr = focusType === 'prom' ? curProms() : curIdee();
  const it  = arr.find(i => i.id === focusId); if (!it) return;
  it.text  = document.getElementById('focus-body').value.trim();
  if (focusType === 'idee') it.title = document.getElementById('focus-ttl-inp').value.trim();
  it.color = focusColor;
  const fdInp = document.getElementById('focus-deadline-inp');
  it.deadline = fdInp.style.display !== 'none' && fdInp.value
    ? new Date(fdInp.value).getTime() : null;
  it.updated = Date.now();
  persist(); renderAll();
  if (shouldClose) { closeFocus(); return; }
  // Aggiorna anche la view dopo il save
  _focusPopulateView(it);
}

function saveFocus() { clearTimeout(autoSaveTimer); doFocusSave(true); }

function closeFocus() {
  clearTimeout(autoSaveTimer);
  if (_focusIsEdit) doFocusSave(false);
  const fm = document.getElementById('focus-modal');
  fm.classList.remove('open');
  fm.removeEventListener('touchmove', _focusBgTouchMove);
  // Dopo l'animazione di chiusura, torna in view mode per la prossima apertura
  setTimeout(() => { if (!fm.classList.contains('open')) _focusShowMode('view'); }, 320);
}

// ══════════════════════════════════════════════════════════
// GESTIONE MODAL
// openModal(): aggiunge .open al modal → CSS lo rende visibile
// closeModal(): rimuove .open
// bgClose(): helper per chiudere cliccando l'overlay scuro
// ══════════════════════════════════════════════════════════
function openModal(id)  { document.getElementById(id).classList.add('open'); applyTwemoji(document.getElementById(id)); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function bgClose(e, id) { if (e.target === e.currentTarget) closeModal(id); }

// ══════════════════════════════════════════════════════════
// MODAL CARD (promemoria / idea)
// openCardMod(): prepara il modal (titolo, campi, color picker) poi lo apre
//   tp: 'prom' o 'idee'
//   id: se presente → modifica; se null → creazione nuova
// saveCard(): legge i valori dal form, salva in S, chiude il modal
// ══════════════════════════════════════════════════════════
function openCardMod(tp, id) {
  eType = tp; eId = id || null;
  let ttl, hd = '', tx = '', clr = null;
  if (id) {
    // Modalità modifica: carica i dati esistenti
    const arr = tp === 'prom' ? curProms() : curIdee();
    const it = arr.find(i => i.id===id); if (!it) return;
    ttl = tp === 'prom' ? 'Modifica promemoria' : 'Modifica idea';
    hd = it.title||''; tx = it.text; clr = it.color;
  } else {
    // Modalità creazione
    ttl = tp === 'prom' ? 'Nuovo promemoria' : 'Nuova idea';
  }
  ePick = clr || null;
  document.getElementById('m-card-ttl').textContent = ttl;
  document.getElementById('m-card-hd').value = hd;
  // Il campo titolo è visibile solo per le Idee (non per i Promemoria)
  document.getElementById('m-hd-wrap').style.display = tp === 'prom' ? 'none' : '';
  document.getElementById('m-card-tx').value = tx;
  buildClrPick('m-card-clr', ePick || 'none');
  // Carica/resetta il campo deadline
  const mdInp = document.getElementById('m-deadline-inp');
  const mdBtn = document.getElementById('m-deadline-toggle');
  const deadlineVal = id ? ((() => { const arr = tp==='prom'?curProms():curIdee(); const it=arr.find(i=>i.id===id); return it?.deadline||null; })()) : null;
  if (deadlineVal) {
    mdInp.value = toLocalDatetimeInput(deadlineVal);
    mdInp.style.display = '';
    mdBtn.textContent = '[on]';
  } else {
    mdInp.value = '';
    mdInp.style.display = 'none';
    mdBtn.textContent = '[off]';
  }
  openModal('m-card');
  setTimeout(() => document.getElementById('m-card-tx').focus(), 300);
}
function saveCard() {
  const tx = document.getElementById('m-card-tx').value.trim();
  if (!tx) { document.getElementById('m-card-tx').focus(); return; } // testo obbligatorio
  const hd  = document.getElementById('m-card-hd').value.trim();
  const now = Date.now();
  const mdInp = document.getElementById('m-deadline-inp');
  const deadline = mdInp.style.display !== 'none' && mdInp.value
    ? new Date(mdInp.value).getTime() : null;
  if (eId) {
    // Aggiorna elemento esistente
    const arr = eType === 'prom' ? curProms() : curIdee();
    const it  = arr.find(i => i.id===eId);
    if (it) { it.text = tx; it.title = hd; it.color = ePick; it.deadline = deadline; it.updated = now; }
  } else {
    // Crea nuovo elemento e lo aggiunge in cima
    const it = {id:uid(), text:tx, title:hd, color:ePick, deadline, pinned:false, created:now, updated:now};
    if (eType === 'prom') curProms().unshift(it); else curIdee().unshift(it);
  }
  persist(); closeModal('m-card'); renderAll();
}

// MODAL LISTA
// openListaMod(): prepara il modal per creare o rinominare una lista
// saveLista(): salva il nome e il colore della lista
// ══════════════════════════════════════════════════════════
function openListaMod(id) {
  eId = id || null; eType = 'liste';
  let nm = '', clr = null;
  if (id) {
    const l = S.liste.find(x => x.id===id);
    if (l) { nm = l.title; clr = l.color; }
    document.getElementById('m-lista-ttl').textContent = 'Rinomina lista';
  } else {
    document.getElementById('m-lista-ttl').textContent = 'Nuova lista';
  }
  ePick = clr || null;
  document.getElementById('m-lista-nm').value = nm;
  buildClrPick('m-lista-clr', ePick || 'none');
  openModal('m-lista');
  setTimeout(() => document.getElementById('m-lista-nm').focus(), 300);
}
function saveLista() {
  const nm = document.getElementById('m-lista-nm').value.trim();
  if (!nm) { document.getElementById('m-lista-nm').focus(); return; }
  const now = Date.now();
  if (eId) {
    const l = S.liste.find(x => x.id===eId);
    if (l) { l.title = nm; l.color = ePick; l.updated = now; }
  } else {
    // Nuova lista: array items vuoto, verrà popolato dall'utente
    S.liste.unshift({id:uid(), title:nm, items:[], color:ePick, pinned:false, created:now, updated:now});
  }
  persist(); closeModal('m-lista'); renderAll();
}

function tglDeadlineField() {
  const inp = document.getElementById('m-deadline-inp');
  const btn = document.getElementById('m-deadline-toggle');
  const isOn = inp.style.display !== 'none';
  inp.style.display = isOn ? 'none' : '';

    if (!inp.value) {
      inp.value = toLocalDatetimeInput(Date.now() + 86400e3); // default: domani
    }
    setTimeout(() => inp.focus(), 50);
  }
}
function tglFocusDeadlineField() {

}

// ══════════════════════════════════════════════════════════
// EXPORT / IMPORT JSON — backup completo dei dati
// doExport(): crea un file JSON con tutti i dati e lo scarica
// doImport(): legge un file JSON e sovrascrive i dati attuali
// ══════════════════════════════════════════════════════════
function doExport() {
  // Crea un Blob (file virtuale) con i dati JSON formattati
  const blob = new Blob([JSON.stringify(S, null, 2)], {type:'application/json'});
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob); // URL temporaneo per il download
  a.download = 'blocco-' + new Date().toISOString().slice(0,10) + '.json'; // nome file con data
  a.click();
  URL.revokeObjectURL(a.href); // libera la memoria
  closeModal('m-io'); toast('[backup esportato]');
}
function doImport(inp) {
  const f = inp.files[0]; if (!f) return;
  const r = new FileReader(); // API browser per leggere file locali
  r.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (!confirm('Sovrascrivere i dati attuali con questo file?')) return;
      S = {
        name:    d.name    || S.name,
        proms:   d.proms   || [],
        idee:    d.idee    || [],
        liste:   d.liste   || [],
        cestino: d.cestino || [],
        theme:   d.theme   || 'dark'
      };
      document.getElementById('name-lbl').textContent = S.name;
      persist(); applyTheme(); renderAll(); renderCestino();
      closeModal('m-io'); toast('[importato]');
    } catch { alert('File non valido'); }
  };
  r.readAsText(f); inp.value = ''; // resetta l'input file per permettere re-import
}

// ══════════════════════════════════════════════════════════
// DRAG AND DROP — riordina le card con pressione lunga + trascinamento
//
// Come funziona:
// 1. touchstart: avvia un timer di 420ms
// 2. Se il dito non si sposta, dopo 420ms → startDrag (prende il controllo)
// 3. touchmove: sposta il "ghost" (copia visiva) e segna la card sotto come target
// 4. touchend: endDrag → scambia le posizioni nell'array e ri-renderizza
//
// Variabili globali usate:
//   dSrcId: id della card che stai trascinando
//   dOvId: id della card su cui stai passando sopra
//   dGhost: elemento DOM clonato che segue il dito
// ══════════════════════════════════════════════════════════
function initDrag(container, tp) {
  if (window.innerWidth >= 680) return; // swipe e touch-drag solo su mobile
  const THRESH = 65; // soglia in px per attivare l'azione
  container.querySelectorAll('.card[data-id]').forEach(card => {
    const slot      = card.closest('.card-slot');
    const delHint   = slot?.querySelector('.del-hint');
    const shareHint = slot?.querySelector('.share-hint');
    let lt = null, dragging = false, ox = 0, oy = 0, moved = false, swiped = false, didDrag = false, lastDx = 0, threshReached = false;
    const clearHints = () => {
      delHint?.classList.remove('hint-on');
      shareHint?.classList.remove('hint-on');
    };
    const snapBack = () => {
      card.style.transition = 'transform .2s ease';
      card.style.transform  = 'translateX(0)';
      clearHints();
    };
    card.addEventListener('touchstart', e => {
      if (e.target.closest('button,input,.lck,.pcb')) return;
      const t = e.touches[0]; ox = t.clientX; oy = t.clientY;
      moved = false; swiped = false; didDrag = false; lastDx = 0; threshReached = false;
      lt = setTimeout(() => { dragging = true; startDrag(card, t); }, 420);
    }, {passive:true});
    card.addEventListener('touchmove', e => {
      const t  = e.touches[0];
      const dx = t.clientX - ox;
      const dy = Math.abs(t.clientY - oy);
      lastDx = dx;
      if (!moved && (Math.abs(dx) > 9 || dy > 9)) {
        moved = true;
        if (lt) { clearTimeout(lt); lt = null; }
      }
      if (moved && !dragging && !swiped) {
        if (dx > 10 && dx > dy * 1.6) {
          // Swipe destra → [del] con rubber-band dopo la soglia
          if (e.cancelable) e.preventDefault();
          const pos = dx < THRESH ? dx : THRESH + (dx - THRESH) * 0.22;
          card.style.transition = 'none';
          card.style.transform  = `translateX(${pos}px)`;
          if (!threshReached && dx >= THRESH) {
            threshReached = true;
            if (navigator.vibrate) navigator.vibrate(8);
            delHint?.classList.add('hint-on');
          } else if (threshReached && dx < THRESH) {
            threshReached = false;
            delHint?.classList.remove('hint-on');
          }
        } else if (dx < -10 && Math.abs(dx) > dy * 1.5) {
          // Swipe sinistra → [share] con rubber-band dopo la soglia
          if (e.cancelable) e.preventDefault();
          const absDx = Math.abs(dx);
          const pos   = absDx < THRESH ? dx : -(THRESH + (absDx - THRESH) * 0.22);
          card.style.transition = 'none';
          card.style.transform  = `translateX(${pos}px)`;
          if (!threshReached && dx <= -THRESH) {
            threshReached = true;
            if (navigator.vibrate) navigator.vibrate(8);
            shareHint?.classList.add('hint-on');
          } else if (threshReached && dx > -THRESH) {
            threshReached = false;
            shareHint?.classList.remove('hint-on');
          }
        }
      }
      if (dragging) { if (e.cancelable) e.preventDefault(); moveDrag(e.touches[0], container); }
    }, {passive:false});
    card.addEventListener('touchend', () => {
      if (lt) { clearTimeout(lt); lt = null; }
      if (dragging) { dragging = false; didDrag = true; endDrag(container, tp); return; }
      if (threshReached && lastDx >= THRESH) {
        // Soglia destra superata → elimina
        swiped = true;
        card.style.transition = 'transform .28s ease,opacity .28s ease';
        card.style.transform  = 'translateX(110%)';
        card.style.opacity    = '0';
        clearHints();
        setTimeout(() => delItem(card.dataset.id, tp), 280);
      } else if (threshReached && lastDx <= -THRESH) {
        // Soglia sinistra superata → share
        snapBack();
        shareItem(card.dataset.id, tp);
      } else {
        snapBack();
      }
    }, {passive:true});
    card.addEventListener('click', e => { if (didDrag) { didDrag = false; e.stopPropagation(); e.preventDefault(); } }, true);
    card.addEventListener('touchcancel', () => {
      if (lt) { clearTimeout(lt); lt = null; }
      if (dragging) { dragging = false; cancelDrag(); }
      snapBack();
    });
  });
}

// Condivide il testo di una nota via Web Share API (iOS share sheet) o clipboard
function shareItem(id, tp) {
  const arr = tp === 'prom' ? S.proms : S.idee;
  const it  = arr?.find(i => i.id === id); if (!it) return;
  const text = (it.title ? it.title + '\n\n' : '') + it.text;
  if (navigator.share) {
    navigator.share({ text }).catch(() => {});
  } else {
    navigator.clipboard?.writeText(text)
      .then(() => toast('[copiato]'))
      .catch(() => toast('[errore copia]'));
  }
}

// Crea il ghost e segna la card originale come placeholder
function startDrag(card, t) {
  dSrcId = card.dataset.id;
  const r = card.getBoundingClientRect();
  dGhost = card.cloneNode(true);
  dGhost.className = 'card drag-ghost';
  dGhost.style.width  = r.width  + 'px';
  dGhost.style.height = r.height + 'px';
  dGhost.style.left   = r.left   + 'px';
  dGhost.style.top    = (t.clientY - r.height / 2) + 'px';
  document.body.appendChild(dGhost);
  card.classList.add('drag-src');
  if (navigator.vibrate) navigator.vibrate(40);
}

// Sposta il ghost e riordina le card nel DOM in tempo reale
function moveDrag(t, container) {
  if (!dGhost || !dSrcId) return;
  dGhost.style.top = (t.clientY - parseInt(dGhost.style.height || 60) / 2) + 'px';

  // Trova quale slot è sotto il dito
  dGhost.style.display = 'none';
  const hit = document.elementFromPoint(t.clientX, t.clientY);
  dGhost.style.display = '';

  const targetCard = hit?.closest('.card[data-id]');
  if (!targetCard || targetCard.dataset.id === dSrcId) return;

  const srcSlot = container.querySelector(`.card[data-id="${dSrcId}"]`)?.closest('.card-slot');
  const tgtSlot = targetCard.closest('.card-slot');
  if (!srcSlot || !tgtSlot || srcSlot === tgtSlot) return;

  // Inserisce prima o dopo in base alla posizione verticale del dito
  const tgtRect = tgtSlot.getBoundingClientRect();
  if (t.clientY < tgtRect.top + tgtRect.height / 2) {
    container.insertBefore(srcSlot, tgtSlot);
  } else {
    container.insertBefore(srcSlot, tgtSlot.nextSibling);
  }
}

// Rilascio: sincronizza l'array con l'ordine del DOM e persiste
function endDrag(container, tp) {
  if (dGhost) { dGhost.remove(); dGhost = null; }
  const srcCard = container.querySelector(`.card[data-id="${dSrcId}"]`);
  if (srcCard) srcCard.classList.remove('drag-src');

  // Legge il nuovo ordine dal DOM e aggiorna l'array
  const k = tp === 'prom' ? 'proms' : tp;
  const newOrder = [...container.querySelectorAll('.card[data-id]')].map(c => c.dataset.id);
  S[k] = newOrder.map(id => S[k].find(i => i.id === id)).filter(Boolean);
  persist(); updateStats();
  dSrcId = null; dOvId = null;
}

// Drag annullato: ripristina visivamente e ri-renderizza
function cancelDrag() {
  if (dGhost) { dGhost.remove(); dGhost = null; }
  document.querySelectorAll('.drag-src').forEach(c => c.classList.remove('drag-src'));
  dSrcId = null; dOvId = null;
  renderAll();
}

// Drag con mouse su desktop — inizia subito al mousedown + move > 5px
function initMouseDrag(container, tp) {
  container.querySelectorAll('.card[data-id]').forEach(card => {
    card.addEventListener('mousedown', e => {
      if (e.target.closest('button,input,.lck,.pcb')) return;
      if (e.button !== 0) return;
      e.preventDefault();
      let dragging = false;
      const sx = e.clientX, sy = e.clientY;
      const onMove = ev => {
        if (!dragging && (Math.abs(ev.clientX-sx)>5 || Math.abs(ev.clientY-sy)>5)) {
          dragging = true;
          startDrag(card, ev);
        }
        if (dragging) moveDrag(ev, container);
      };
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        if (dragging) endDrag(container, tp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

// ══════════════════════════════════════════════════════════
// DRAG VOCI LISTA — riordina le voci dentro una lista
// Usa un handle ⠿ su ogni riga; touch e mouse supportati.
// ══════════════════════════════════════════════════════════
function initListItemDrag(lid) {
  const lst    = S.liste.find(x => x.id === lid);
  const lrows  = document.querySelector(`.card[data-id="${lid}"] .lrows`);
  if (!lst || !lrows) return;

  let srcRow = null, gh = null, oy = 0;

  const doStart = (row, cx, cy) => {
    srcRow = row;
    const r = row.getBoundingClientRect();
    oy = cy - r.top;
    gh = row.cloneNode(true);
    gh.className = 'lrow lrow-ghost';
    gh.style.width = r.width + 'px';
    gh.style.left  = r.left  + 'px';
    gh.style.top   = r.top   + 'px';
    document.body.appendChild(gh);
    row.style.opacity = '.15';
  };

  const doMove = (cx, cy) => {
    if (!gh || !srcRow) return;
    gh.style.top = (cy - oy) + 'px';
    gh.style.display = 'none';
    const hit = document.elementFromPoint(cx, cy);
    gh.style.display = '';
    const tgt = hit?.closest('.lrow[data-iid]');
    if (tgt && tgt !== srcRow && lrows.contains(tgt)) {
      const tr = tgt.getBoundingClientRect();
      lrows.insertBefore(srcRow, cy < tr.top + tr.height / 2 ? tgt : tgt.nextSibling);
    }
  };

  const doEnd = () => {
    if (gh) { gh.remove(); gh = null; }
    if (!srcRow) return;
    srcRow.style.opacity = '';
    const newOrder = [...lrows.querySelectorAll('.lrow[data-iid]')].map(r => r.dataset.iid);
    lst.items = newOrder.map(id => lst.items.find(i => i.id === id)).filter(Boolean);
    lst.updated = Date.now();
    persist();
    srcRow = null;
  };

  lrows.querySelectorAll('.ldrag').forEach(handle => {
    const row = handle.closest('.lrow');

    // Mouse
    handle.addEventListener('mousedown', e => {
      e.preventDefault();
      doStart(row, e.clientX, e.clientY);
      const onMove = ev => doMove(ev.clientX, ev.clientY);
      const onUp   = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); doEnd(); };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    // Touch
    handle.addEventListener('touchstart', e => {
      e.preventDefault();
      const t = e.touches[0];
      doStart(row, t.clientX, t.clientY);
      if (navigator.vibrate) navigator.vibrate(20);
    }, {passive: false});

    handle.addEventListener('touchmove', e => {
      if (!gh) return;
      if (e.cancelable) e.preventDefault();
      const t = e.touches[0];
      doMove(t.clientX, t.clientY);
    }, {passive: false});

    handle.addEventListener('touchend',    doEnd, {passive: true});
    handle.addEventListener('touchcancel', doEnd, {passive: true});
  });
}

// ══════════════════════════════════════════════════════════
// SWIPE TRA TAB — swipe orizzontale per cambiare sezione
// Solo su mobile; non interferisce con lo swipe delle card
// (il tocco sulle .card-slot viene ignorato)
// ══════════════════════════════════════════════════════════
function initTabSwipe() {
  const TAB_ORDER = ['prom','idee','liste','cestino'];
  const views = document.querySelector('.views');
  let tx = null, ty = 0, moving = false;

  views.addEventListener('touchstart', e => {
    // Ignora se il tocco parte su una card o su un elemento interattivo
    if (e.target.closest('.card-slot,button,input,.lck,.pcb,.ldrag')) {
      tx = null; return;
    }
    const t = e.touches[0];
    tx = t.clientX; ty = t.clientY; moving = false;
  }, {passive: true});

  views.addEventListener('touchmove', e => {
    if (tx === null) return;
    const t = e.touches[0];
    if (Math.abs(t.clientX - tx) > 8 || Math.abs(t.clientY - ty) > 8) moving = true;
  }, {passive: true});

  views.addEventListener('touchend', e => {
    if (tx === null || !moving) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - tx;
    const dy = Math.abs(t.clientY - ty);
    tx = null; moving = false;
    // Soglia 70px orizzontale, angolo non troppo verticale
    if (Math.abs(dx) < 70 || dy > Math.abs(dx) * 0.65) return;
    const idx = TAB_ORDER.indexOf(curTab);
    if (dx < 0 && idx < TAB_ORDER.length - 1) goTab(TAB_ORDER[idx + 1]); // sinistra → avanti
    if (dx > 0 && idx > 0)                    goTab(TAB_ORDER[idx - 1]); // destra  → indietro
  }, {passive: true});
}

// Nascondi FAB quando la tastiera iOS è aperta (qualsiasi input attivo)
document.addEventListener('focusin', e => {
  if (e.target.matches('input,textarea')) {
    const fab = document.getElementById('fab');
    if (fab) fab.style.visibility = 'hidden';
  }
});
document.addEventListener('focusout', () => {
  setTimeout(() => {
    if (!document.activeElement || !document.activeElement.matches('input,textarea')) {
      const fab = document.getElementById('fab');
      if (fab) fab.style.visibility = '';
    }
  }, 150);
});
// Blocca il bounce/scroll della pagina intera su iOS.
// Solo i contenitori esplicitamente scrollabili possono ricevere touchmove.
document.addEventListener('touchmove', e => {
  if (!e.target.closest('.view, .focus-view, .modal-sheet, textarea')) {
    e.preventDefault();
  }
}, {passive: false});

document.addEventListener('visibilitychange', () => {
  if (document.hidden && secretMode) toggleSecretMode();
});

// Fix iOS: tastiera copre le ultime righe della textarea.
// Quando il visual viewport si riduce (tastiera aperta), aggiungo
// padding-bottom alla textarea pari all'altezza della tastiera,
// così l'ultima riga può essere scrollata sopra la tastiera.
if (window.visualViewport) {
  visualViewport.addEventListener('resize', () => {
    const ta = document.getElementById('focus-body');
    if (!ta) return;
    const kbH = window.innerHeight - visualViewport.height;
    ta.style.paddingBottom = (kbH > 80 ? kbH + 24 : 16) + 'px';
  });
}
// Swipe destra per chiudere il focus sheet (come iOS Notes)
(function() {
  const fm = document.getElementById('focus-modal');
  let sx = 0, sy = 0, tracking = false, swiping = false, dx = 0;

  fm.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    tracking = true; swiping = false; dx = 0;
    fm.style.transition = 'none';
  }, {passive: true});

  fm.addEventListener('touchmove', e => {
    if (!tracking || e.touches.length !== 1) return;
    const ddx = e.touches[0].clientX - sx;
    const ddy = e.touches[0].clientY - sy;
    if (!swiping) {
      if (Math.abs(ddx) < 10 && Math.abs(ddy) < 10) return;
      if (ddx > 0 && Math.abs(ddx) > Math.abs(ddy) * 1.2) {
        swiping = true; // swipe orizzontale verso destra confermato
      } else {
        tracking = false; return; // verticale o verso sinistra: lascia scorrere normalmente
      }
    }
    dx = Math.max(0, ddx);
    fm.style.transform = `translateX(${dx}px)`;
    fm.style.opacity = String(1 - dx / window.innerWidth * 0.4);
    e.preventDefault();
    e.stopImmediatePropagation();
  }, {passive: false});

  fm.addEventListener('touchend', () => {
    if (!swiping) { fm.style.transition = ''; return; }
    swiping = false; tracking = false;
    if (dx > window.innerWidth * 0.3) {
      fm.style.transition = 'transform .28s cubic-bezier(.32,.72,0,1), opacity .28s';
      fm.style.transform  = `translateX(${window.innerWidth}px)`;
      fm.style.opacity    = '0';
      setTimeout(() => {
        fm.style.transform = '';
        fm.style.opacity   = '';
        fm.style.transition = '';
        closeFocus();
      }, 280);
    } else {
      fm.style.transition = 'transform .22s ease, opacity .22s';
      fm.style.transform  = '';
      fm.style.opacity    = '';
      setTimeout(() => fm.style.transition = '', 220);
    }
    dx = 0;
  }, {passive: true});
})();

setTimeout(() => {
  const s = document.getElementById('splash');
  if (s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 400); }
}, 1200);

// ══════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS — solo desktop
// ══════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.target.matches('input,textarea,select')) return;
  if (e.metaKey || e.ctrlKey) return;
  if (window.innerWidth < 680) return;
  switch(e.key) {
    case 'n': case 'N': e.preventDefault(); onFab(); break;
    case '1': goTab('prom'); break;
    case '2': goTab('idee'); break;
    case '3': goTab('liste'); break;
    case '4': goTab('cestino'); break;
    case '/': e.preventDefault(); tglSearch(); break;
    case 'Escape':
      if (sOpen) tglSearch();
      break;
  }
});
