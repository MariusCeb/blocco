<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="22" fill="#18181b"/>
  <!-- notebook body -->
  <rect x="26" y="22" width="48" height="58" rx="5" fill="#27272a" stroke="#3f3f46" stroke-width="1.5"/>
  <!-- spine binding dots -->
  <circle cx="26" cy="36" r="3.5" fill="#18181b" stroke="#fafafa" stroke-width="1.5"/>
  <circle cx="26" cy="50" r="3.5" fill="#18181b" stroke="#fafafa" stroke-width="1.5"/>
  <circle cx="26" cy="64" r="3.5" fill="#18181b" stroke="#fafafa" stroke-width="1.5"/>
  <!-- lines -->
  <line x1="36" y1="40" x2="64" y2="40" stroke="#fafafa" stroke-width="2.2" stroke-linecap="round" opacity=".85"/>
  <line x1="36" y1="51" x2="64" y2="51" stroke="#fafafa" stroke-width="2.2" stroke-linecap="round" opacity=".6"/>
  <line x1="36" y1="62" x2="54" y2="62" stroke="#fafafa" stroke-width="2.2" stroke-linecap="round" opacity=".4"/>
  <!-- pencil accent dot -->
  <circle cx="68" cy="72" r="6" fill="#facc15"/>
  <line x1="65" y1="69" x2="71" y2="75" stroke="#18181b" stroke-width="2" stroke-linecap="round"/>
</svg>
