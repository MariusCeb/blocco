<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Blocco">
  <meta name="theme-color" content="#0e0e0e" id="tc-meta">
  <link rel="manifest" href="./notes-manifest.json">
  <link rel="apple-touch-icon" href="./notes-icon.svg">
  <title>Blocco — Note</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
  <style>
/* ── TOKENS ───────────────────────────────────────────── */
:root {
  --bg:    #0e0e0e;
  --s1:    #161616;
  --s2:    #1e1e1e;
  --s3:    #272727;
  --bd:    rgba(255,255,255,.07);
  --bd2:   rgba(255,255,255,.13);
  --text:  #e8e6e1;
  --muted: #5e5e5e;
  --dim:   #333333;
  --accent:#a78bfa;
  --mono:  'IBM Plex Mono', monospace;
  --r:     5px;
  --st:    env(safe-area-inset-top, 0px);
  --sb:    env(safe-area-inset-bottom, 0px);
}
html.light {
  --bg:    #f0eeea;
  --s1:    #e8e6e2;
  --s2:    #dddbd7;
  --s3:    #d2d0cc;
  --bd:    rgba(0,0,0,.08);
  --bd2:   rgba(0,0,0,.15);
  --text:  #111111;
  --muted: #888888;
  --dim:   #cccccc;
  --accent:#7c3aed;
}

/* ── RESET ────────────────────────────────────────────── */
*,*::before,*::after {
  margin:0;padding:0;box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}
body {
  background:var(--bg);color:var(--text);font-family:var(--mono);
  height:100dvh;display:flex;flex-direction:column;overflow:hidden;
  font-size:13px;transition:background .3s,color .3s;
}

/* ── HEADER ───────────────────────────────────────────── */
.vhead {
  padding:calc(var(--st) + 14px) 20px 12px;flex-shrink:0;
  display:flex;align-items:flex-start;justify-content:space-between;
  border-bottom:1px solid var(--bd);
}
.vlabel {font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.16em;margin-bottom:3px}
.vbig  {font-size:18px;font-weight:600;letter-spacing:-.02em;line-height:1.2}
.vbig .hl {color:var(--accent)}
.nametap {cursor:pointer;border-bottom:1px dashed var(--muted);padding-bottom:1px}
.hbts  {display:flex;gap:6px;margin-top:2px}
.hbt   {
  background:transparent;border:1px solid var(--bd2);border-radius:var(--r);
  width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:13px;color:var(--muted);
  -webkit-appearance:none;transition:border-color .15s;
}
.hbt:active {border-color:var(--accent)}
.hbt img.emoji {width:13px;height:13px;pointer-events:none}

/* ── SEARCH ───────────────────────────────────────────── */
.sbar {
  border-bottom:1px solid var(--bd);flex-shrink:0;
  max-height:0;overflow:hidden;transition:max-height .25s ease;
}
.sbar.open {max-height:50px}
.sinp {
  display:block;width:100%;background:transparent;border:none;
  padding:12px 20px;color:var(--text);font-family:var(--mono);font-size:11px;
  outline:none;letter-spacing:.04em;
}
.sinp::placeholder {color:var(--dim);text-transform:uppercase;letter-spacing:.1em}

/* ── TABS ─────────────────────────────────────────────── */
.tabs {display:flex;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--s1)}
.tab  {
  flex:1;padding:10px 0;font-size:9px;font-weight:600;letter-spacing:.14em;
  text-transform:uppercase;color:var(--muted);background:none;border:none;
  cursor:pointer;font-family:var(--mono);position:relative;transition:color .15s;
  -webkit-appearance:none;
}
.tab.on {color:var(--text)}
.tab.on::after {
  content:'';position:absolute;bottom:0;left:20%;right:20%;
  height:1.5px;background:var(--accent);border-radius:1px;
}

/* ── VIEWS ────────────────────────────────────────────── */
.views {flex:1;overflow:hidden;position:relative}
.view  {
  position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;display:none;
}
.view.on  {display:block}
.vscroll  {padding:12px 16px calc(var(--sb) + 80px)}
.stack    {display:flex;flex-direction:column;gap:8px}

/* ── CARD ─────────────────────────────────────────────── */
.card {
  background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);
  overflow:hidden;position:relative;animation:fadeIn .2s ease both;
}
@keyframes fadeIn {from{opacity:0;transform:translateY(4px)}}
.card.pin-on::after {
  content:'▲';position:absolute;top:9px;right:10px;
  font-size:7px;color:var(--accent);opacity:.8;font-family:var(--mono);
}
/* color label: left border */
.clr-red    {border-left:2.5px solid #f87171!important}
.clr-orange {border-left:2.5px solid #fb923c!important}
.clr-yellow {border-left:2.5px solid #facc15!important}
.clr-green  {border-left:2.5px solid #4ade80!important}
.clr-blue   {border-left:2.5px solid #60a5fa!important}
.clr-purple {border-left:2.5px solid #a78bfa!important}

/* card meta row */
.cmeta {
  display:flex;align-items:center;gap:8px;
  padding:5px 11px 8px;border-top:1px solid var(--bd);
}
.cts   {font-size:8px;color:var(--muted);letter-spacing:.06em;flex:1}
.cacts {display:flex;gap:4px}
.cact  {
  font-size:8px;padding:3px 8px;border:1px solid var(--bd);border-radius:3px;
  background:transparent;cursor:pointer;color:var(--muted);font-family:var(--mono);
  letter-spacing:.06em;-webkit-appearance:none;transition:all .12s;
}
.cact:active     {border-color:var(--accent);color:var(--text)}
.cact.del:active {border-color:#e94560;color:#e94560}

/* ── PROMEMORIA ───────────────────────────────────────── */
.prow  {display:flex;align-items:flex-start;gap:10px;padding:10px 12px 6px}
.pcb   {
  width:17px;height:17px;border-radius:50%;border:1.5px solid var(--muted);
  flex-shrink:0;cursor:pointer;background:transparent;margin-top:2px;
  transition:border-color .12s;
}
.pcb:active {border-color:var(--accent)}
.ptext {
  flex:1;font-size:11px;line-height:1.65;white-space:pre-wrap;
  word-break:break-word;cursor:pointer;letter-spacing:.01em;
}

/* ── IDEA CARD ────────────────────────────────────────── */
.cbody  {padding:10px 12px 6px;cursor:pointer}
.ctitle {font-size:11px;font-weight:600;margin-bottom:4px;letter-spacing:.02em}
.ctext  {font-size:11px;line-height:1.65;white-space:pre-wrap;word-break:break-word;letter-spacing:.01em}

/* ── LISTA CARD ───────────────────────────────────────── */
.lhead  {
  padding:10px 12px 8px;display:flex;align-items:center;gap:8px;
  border-bottom:1px solid var(--bd);
}
.ltitle {font-size:11px;font-weight:600;letter-spacing:.02em;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lprog  {font-size:8px;color:var(--muted);flex-shrink:0;letter-spacing:.08em}
.lrows  {padding:4px 12px 0}
.lrow   {
  display:flex;align-items:center;gap:8px;padding:5px 0;
  border-bottom:1px solid var(--bd);
}
.lrow:last-child {border-bottom:none}
.lck    {
  width:15px;height:15px;border:1.5px solid var(--muted);border-radius:3px;
  flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:9px;transition:background .12s,border-color .12s;
}
.lck.on {background:var(--accent);border-color:var(--accent);color:#fff}
.lit    {flex:1;font-size:11px;cursor:pointer;letter-spacing:.01em}
.lit.done {text-decoration:line-through;color:var(--muted)}
.ldel   {
  background:none;border:none;cursor:pointer;color:var(--dim);
  font-size:15px;line-height:1;padding:0 2px;transition:color .12s;
}
.ldel:active {color:#e94560}
.ladd   {
  display:flex;gap:8px;padding:8px 12px 10px;border-top:1px solid var(--bd);
}
.laddinp {
  flex:1;background:transparent;border:none;outline:none;
  font-size:11px;color:var(--text);font-family:var(--mono);letter-spacing:.01em;
}
.laddinp::placeholder {color:var(--dim)}
.laddbtn {
  background:none;border:none;cursor:pointer;color:var(--muted);
  font-size:17px;line-height:1;transition:color .12s;
}
.laddbtn:active {color:var(--accent)}

/* ── FAB ──────────────────────────────────────────────── */
.fab {
  position:fixed;bottom:calc(var(--sb) + 20px);right:18px;z-index:60;
  width:50px;height:50px;border-radius:50%;background:var(--accent);
  border:none;font-size:26px;cursor:pointer;color:#fff;
  box-shadow:0 4px 18px rgba(0,0,0,.4);transition:transform .15s,opacity .15s;
  display:flex;align-items:center;justify-content:center;font-family:var(--mono);
}
.fab:active {transform:scale(.88)}

/* ── MODAL ────────────────────────────────────────────── */
.modal-bg {
  position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;
  display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s;
}
.modal-bg.open {opacity:1;pointer-events:auto}
.modal-sheet {
  background:var(--s1);border-top:1px solid var(--bd2);
  padding:16px 18px calc(var(--sb) + 18px);width:100%;
  transform:translateY(14px);transition:transform .25s;
  max-height:90dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.modal-bg.open .modal-sheet {transform:translateY(0)}
.modal-ttl  {font-size:9px;font-weight:600;margin-bottom:14px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.m-field    {margin-bottom:9px}
.m-lbl      {font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px}
.m-inp      {
  width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:3px;
  padding:9px 11px;color:var(--text);font-family:var(--mono);font-size:12px;
  outline:none;-webkit-appearance:none;transition:border-color .15s;resize:none;
}
.m-inp:focus {border-color:var(--bd2)}
.m-inp::placeholder {color:var(--dim)}
.m-actions  {display:flex;gap:8px;margin-top:12px}
.m-cancel   {
  flex:1;padding:10px;background:var(--s2);border:1px solid var(--bd);
  border-radius:3px;color:var(--muted);font-family:var(--mono);font-size:10px;
  cursor:pointer;-webkit-appearance:none;letter-spacing:.06em;
}
.m-confirm  {
  flex:1;padding:10px;background:var(--accent);border:none;
  border-radius:3px;color:#fff;font-family:var(--mono);font-size:10px;
  font-weight:600;cursor:pointer;-webkit-appearance:none;letter-spacing:.06em;
}
.m-cancel:active  {background:var(--s3)}
.m-confirm:active {opacity:.85}

/* ── COLOR PICKER ─────────────────────────────────────── */
.clrpick {display:flex;gap:8px;flex-wrap:wrap;padding:2px 0}
.clrdot  {
  width:22px;height:22px;border-radius:50%;cursor:pointer;
  border:2.5px solid transparent;transition:transform .12s,border-color .12s;
}
.clrdot:active {transform:scale(.8)}
.clrdot.sel    {border-color:var(--text)}
.clrnone       {background:var(--s3);border:1.5px dashed var(--bd2)}

/* ── TOAST ────────────────────────────────────────────── */
.toast {
  position:fixed;top:calc(var(--st) + 54px);left:50%;
  transform:translateX(-50%) translateY(-8px);
  background:var(--s1);border:1px solid var(--bd2);
  border-radius:50px;padding:6px 16px;font-size:9px;font-weight:500;letter-spacing:.08em;
  z-index:300;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;
}
.toast.show {opacity:1;transform:translateX(-50%) translateY(0)}

/* ── EMPTY STATE ──────────────────────────────────────── */
.empty {
  padding:52px 20px;text-align:center;color:var(--muted);
  font-size:10px;line-height:1.9;letter-spacing:.06em;
}
.empi {font-size:26px;display:block;margin-bottom:10px;opacity:.35}

/* ── DRAG ─────────────────────────────────────────────── */
.drag-ghost {
  position:fixed;z-index:400;pointer-events:none;opacity:.85;
  transform:scale(1.02) rotate(.3deg);box-shadow:0 8px 30px rgba(0,0,0,.45);
  border-radius:var(--r);overflow:hidden;
}
.drag-src {opacity:.18}
.drag-ov  {outline:1px dashed var(--accent);outline-offset:2px}

/* ── BACKUP BUTTONS ───────────────────────────────────── */
.bk-btn {
  width:100%;padding:11px;background:var(--s2);border:1px solid var(--bd);
  border-radius:3px;color:var(--text);font-family:var(--mono);font-size:10px;
  cursor:pointer;letter-spacing:.08em;-webkit-appearance:none;
  display:flex;align-items:center;justify-content:center;gap:8px;transition:background .12s;
}
.bk-btn:active {background:var(--s3)}
.bk-btn img.emoji {width:13px;height:13px;pointer-events:none}
  </style>
</head>
<body>

<!-- HEADER -->
<div class="vhead">
  <div>
    <div class="vlabel">Blocco note</div>
    <div class="vbig">
      <span class="nametap" id="name-lbl" onclick="editName()">Marius</span>
      <span class="hl"> .</span>
    </div>
  </div>
  <div class="hbts">
    <button class="hbt" id="sbtn"      onclick="tglSearch()" title="Cerca">🔍</button>
    <button class="hbt" id="theme-btn" onclick="tglTheme()"  title="Tema">🌙</button>
    <button class="hbt"                onclick="openModal('m-io')" title="Backup">💾</button>
  </div>
</div>

<!-- SEARCH -->
<div class="sbar" id="sbar">
  <input class="sinp" id="sinp" type="search" placeholder="Cerca..." oninput="doSearch(this.value)">
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab on" id="tab-prom"  onclick="goTab('prom')">Promemoria</button>
  <button class="tab"    id="tab-idee"  onclick="goTab('idee')">Idee</button>
  <button class="tab"    id="tab-liste" onclick="goTab('liste')">Liste</button>
</div>

<!-- VIEWS -->
<div class="views">
  <div class="view on" id="v-prom"><div class="vscroll"><div class="stack" id="prom-l"></div></div></div>
  <div class="view"    id="v-idee"><div class="vscroll"><div class="stack" id="idee-l"></div></div></div>
  <div class="view"    id="v-liste"><div class="vscroll"><div class="stack" id="liste-l"></div></div></div>
</div>

<!-- FAB -->
<button class="fab" onclick="onFab()">+</button>

<!-- Modal: card (prom / idea) -->
<div class="modal-bg" id="m-card" onclick="bgClose(event,'m-card')">
  <div class="modal-sheet">
    <div class="modal-ttl" id="m-card-ttl">Nuovo</div>
    <div class="m-field" id="m-hd-wrap">
      <div class="m-lbl">Titolo</div>
      <input class="m-inp" id="m-card-hd" placeholder="Titolo (opzionale)...">
    </div>
    <div class="m-field">
      <div class="m-lbl">Nota</div>
      <textarea class="m-inp" id="m-card-tx" rows="4" placeholder="Scrivi qui..."></textarea>
    </div>
    <div class="m-field">
      <div class="m-lbl">Etichetta colore</div>
      <div class="clrpick" id="m-card-clr"></div>
    </div>
    <div class="m-actions">
      <button class="m-cancel"  onclick="closeModal('m-card')">Annulla</button>
      <button class="m-confirm" onclick="saveCard()">Salva</button>
    </div>
  </div>
</div>

<!-- Modal: lista -->
<div class="modal-bg" id="m-lista" onclick="bgClose(event,'m-lista')">
  <div class="modal-sheet">
    <div class="modal-ttl" id="m-lista-ttl">Nuova lista</div>
    <div class="m-field">
      <div class="m-lbl">Nome lista</div>
      <input class="m-inp" id="m-lista-nm" placeholder="es. Spesa, Film da vedere...">
    </div>
    <div class="m-field">
      <div class="m-lbl">Etichetta colore</div>
      <div class="clrpick" id="m-lista-clr"></div>
    </div>
    <div class="m-actions">
      <button class="m-cancel"  onclick="closeModal('m-lista')">Annulla</button>
      <button class="m-confirm" onclick="saveLista()">Salva</button>
    </div>
  </div>
</div>

<!-- Modal: backup -->
<div class="modal-bg" id="m-io" onclick="bgClose(event,'m-io')">
  <div class="modal-sheet">
    <div class="modal-ttl">Backup dati</div>
    <div class="m-field">
      <button class="bk-btn" onclick="doExport()">📤 Esporta JSON</button>
    </div>
    <div class="m-field">
      <button class="bk-btn" onclick="document.getElementById('f-in').click()">📥 Importa JSON</button>
      <input type="file" id="f-in" accept=".json" style="display:none" onchange="doImport(this)">
    </div>
    <div class="m-actions">
      <button class="m-cancel" style="width:100%" onclick="closeModal('m-io')">Chiudi</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── Constants ──────────────────────────────────────────────────────
const CLRS   = ['red','orange','yellow','green','blue','purple'];
const CLRHEX = {red:'#f87171',orange:'#fb923c',yellow:'#facc15',green:'#4ade80',blue:'#60a5fa',purple:'#a78bfa'};

// ── State ──────────────────────────────────────────────────────────
let S = load();
let curTab = 'prom';
let q = '';
let eId = null, eType = null, ePick = null;
let dSrcId = null, dOvId = null, dGhost = null;

function load() {
  try {
    const d = JSON.parse(localStorage.getItem('blocco') || '{}');
    return {
      name:  d.name  || 'Marius',
      proms: d.proms || [],
      idee:  d.idee  || [],
      liste: d.liste || [],
      theme: d.theme || 'dark'
    };
  } catch { return {name:'Marius',proms:[],idee:[],liste:[],theme:'dark'}; }
}
function persist() { localStorage.setItem('blocco', JSON.stringify(S)); }
function uid()     { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function fmtTs(t) {
  const diff = Date.now() - t;
  if (diff < 60e3)       return 'adesso';
  if (diff < 3600e3)     return Math.floor(diff/60e3)    + 'm fa';
  if (diff < 86400e3)    return Math.floor(diff/3600e3)  + 'h fa';
  if (diff < 7*86400e3)  return Math.floor(diff/86400e3) + 'g fa';
  return new Date(t).toLocaleDateString('it-IT', {day:'numeric', month:'short'});
}
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
function toast(msg, dur=2000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), dur);
}

// ── Twemoji ────────────────────────────────────────────────────────
function applyTwemoji(el) {
  if (typeof twemoji === 'undefined') return;
  twemoji.parse(el || document.body, {
    base:'https://abs.twimg.com/emoji/v2/', folder:'svg', ext:'.svg'
  });
}

// ── Theme ──────────────────────────────────────────────────────────
function applyTheme() {
  document.documentElement.classList.toggle('light', S.theme === 'light');
  document.getElementById('theme-btn').textContent = S.theme === 'light' ? '🌙' : '☀️';
  document.getElementById('tc-meta').content = S.theme === 'light' ? '#f0eeea' : '#0e0e0e';
  requestAnimationFrame(() => applyTwemoji());
}
function tglTheme() { S.theme = S.theme === 'light' ? 'dark' : 'light'; persist(); applyTheme(); }

// ── Name ───────────────────────────────────────────────────────────
function editName() {
  const n = prompt('Il tuo nome:', S.name);
  if (n && n.trim()) {
    S.name = n.trim(); persist();
    document.getElementById('name-lbl').textContent = S.name;
    applyTwemoji(document.querySelector('.vhead'));
  }
}

// ── Search ─────────────────────────────────────────────────────────
let sOpen = false;
function tglSearch() {
  sOpen = !sOpen;
  document.getElementById('sbar').classList.toggle('open', sOpen);
  if (sOpen) setTimeout(() => document.getElementById('sinp').focus(), 260);
  else { document.getElementById('sinp').value = ''; q = ''; renderAll(); }
}
function doSearch(v) { q = v.toLowerCase().trim(); renderAll(); }
function matches(arr) { return !q || arr.some(s => s && s.toLowerCase().includes(q)); }

// ── Tabs ───────────────────────────────────────────────────────────
function goTab(t) {
  curTab = t;
  document.querySelectorAll('.tab').forEach(b  => b.classList.toggle('on', b.id === 'tab-'+t));
  document.querySelectorAll('.view').forEach(v => v.classList.toggle('on', v.id === 'v-'+t));
}

// ── Color helpers ──────────────────────────────────────────────────
function clrCls(c) { return c ? ' clr-'+c : ''; }
function buildClrPick(elId, sel) {
  document.getElementById(elId).innerHTML = ['none',...CLRS].map(c => `
    <div class="clrdot${c==='none'?' clrnone':''}${(sel||'none')===c?' sel':''}"
      style="${c!=='none' ? 'background:'+CLRHEX[c] : ''}"
      onclick="pickClr('${elId}','${c}')"></div>
  `).join('');
}
function pickClr(elId, c) { ePick = c === 'none' ? null : c; buildClrPick(elId, c); }

// ── Render: Promemoria ─────────────────────────────────────────────
function renderProms() {
  const el = document.getElementById('prom-l');
  let items = [...S.proms].sort((a,b) => (b.pinned?1:0)-(a.pinned?1:0) || b.created-a.created);
  if (q) items = items.filter(i => matches([i.text]));
  if (!items.length) {
    el.innerHTML = '<div class="empty"><span class="empi">📝</span>Nessun promemoria.<br>Premi + per aggiungerne uno.</div>';
    applyTwemoji(el); return;
  }
  el.innerHTML = items.map(i => `
    <div class="card${i.pinned?' pin-on':''}${clrCls(i.color)}" data-id="${i.id}" data-tp="prom">
      <div class="prow">
        <div class="pcb" onclick="chkProm('${i.id}')"></div>
        <div class="ptext" onclick="openCardMod('prom','${i.id}')">${esc(i.text)}</div>
      </div>
      <div class="cmeta">
        <span class="cts">${fmtTs(i.updated||i.created)}</span>
        <div class="cacts">
          <button class="cact"     onclick="pinItem('${i.id}','prom')">${i.pinned?'unpin':'pin'}</button>
          <button class="cact"     onclick="openCardMod('prom','${i.id}')">edit</button>
          <button class="cact del" onclick="delItem('${i.id}','prom')">del</button>
        </div>
      </div>
    </div>
  `).join('');
  initDrag(el, 'prom');
  applyTwemoji(el);
}

function chkProm(id) {
  const card = document.querySelector(`[data-id="${id}"]`);
  if (!card) return;
  card.style.transition = 'opacity .3s ease,transform .3s ease';
  card.style.opacity = '0'; card.style.transform = 'translateX(44px)';
  setTimeout(() => { S.proms = S.proms.filter(i => i.id !== id); persist(); renderProms(); }, 320);
}

// ── Render: Idee ───────────────────────────────────────────────────
function renderIdee() {
  const el = document.getElementById('idee-l');
  let items = [...S.idee].sort((a,b) => (b.pinned?1:0)-(a.pinned?1:0) || b.created-a.created);
  if (q) items = items.filter(i => matches([i.title, i.text]));
  if (!items.length) {
    el.innerHTML = '<div class="empty"><span class="empi">💡</span>Nessuna idea.<br>Premi + per aggiungerne una.</div>';
    applyTwemoji(el); return;
  }
  el.innerHTML = items.map(i => `
    <div class="card${i.pinned?' pin-on':''}${clrCls(i.color)}" data-id="${i.id}" data-tp="idee">
      <div class="cbody" onclick="openCardMod('idee','${i.id}')">
        ${i.title ? `<div class="ctitle">${esc(i.title)}</div>` : ''}
        <div class="ctext">${esc(i.text)}</div>
      </div>
      <div class="cmeta">
        <span class="cts">${fmtTs(i.updated||i.created)}</span>
        <div class="cacts">
          <button class="cact"     onclick="pinItem('${i.id}','idee')">${i.pinned?'unpin':'pin'}</button>
          <button class="cact"     onclick="openCardMod('idee','${i.id}')">edit</button>
          <button class="cact del" onclick="delItem('${i.id}','idee')">del</button>
        </div>
      </div>
    </div>
  `).join('');
  initDrag(el, 'idee');
  applyTwemoji(el);
}

// ── Render: Liste ──────────────────────────────────────────────────
function renderListe() {
  const el = document.getElementById('liste-l');
  let items = [...S.liste].sort((a,b) => (b.pinned?1:0)-(a.pinned?1:0) || b.created-a.created);
  if (q) items = items.filter(i => matches([i.title, ...i.items.map(r => r.text)]));
  if (!items.length) {
    el.innerHTML = '<div class="empty"><span class="empi">📋</span>Nessuna lista.<br>Premi + per crearne una.</div>';
    applyTwemoji(el); return;
  }
  el.innerHTML = items.map(lst => {
    const done = lst.items.filter(r => r.done).length;
    return `
      <div class="card${lst.pinned?' pin-on':''}${clrCls(lst.color)}" data-id="${lst.id}" data-tp="liste">
        <div class="lhead">
          <span class="ltitle">${esc(lst.title)}</span>
          <span class="lprog">${done}/${lst.items.length}</span>
        </div>
        <div class="lrows">
          ${lst.items.map(r => `
            <div class="lrow">
              <div class="lck${r.done?' on':''}" onclick="tglLI('${lst.id}','${r.id}')">${r.done?'✓':''}</div>
              <span class="lit${r.done?' done':''}" onclick="editLI('${lst.id}','${r.id}')">${esc(r.text)}</span>
              <button class="ldel" onclick="delLI('${lst.id}','${r.id}')">×</button>
            </div>
          `).join('')}
        </div>
        <div class="ladd">
          <input class="laddinp" id="ladd-${lst.id}" placeholder="Aggiungi voce..."
            onkeydown="if(event.key==='Enter')addLI('${lst.id}',this)">
          <button class="laddbtn" onclick="addLI('${lst.id}',document.getElementById('ladd-${lst.id}'))">+</button>
        </div>
        <div class="cmeta">
          <span class="cts">${fmtTs(lst.updated||lst.created)}</span>
          <div class="cacts">
            <button class="cact"     onclick="pinItem('${lst.id}','liste')">${lst.pinned?'unpin':'pin'}</button>
            <button class="cact"     onclick="openListaMod('${lst.id}')">edit</button>
            <button class="cact del" onclick="delItem('${lst.id}','liste')">del</button>
          </div>
        </div>
      </div>
    `;
  }).join('');
  initDrag(el, 'liste');
  applyTwemoji(el);
}

function tglLI(lid, iid) {
  const l = S.liste.find(x => x.id===lid); if (!l) return;
  const it = l.items.find(x => x.id===iid); if (!it) return;
  it.done = !it.done; l.updated = Date.now(); persist(); renderListe();
}
function addLI(lid, inp) {
  const t = inp.value.trim(); if (!t) return;
  const l = S.liste.find(x => x.id===lid); if (!l) return;
  l.items.push({id:uid(), text:t, done:false});
  l.updated = Date.now(); inp.value = ''; persist(); renderListe();
  setTimeout(() => { const ni = document.getElementById('ladd-'+lid); if (ni) ni.focus(); }, 50);
}
function delLI(lid, iid) {
  const l = S.liste.find(x => x.id===lid); if (!l) return;
  l.items = l.items.filter(i => i.id!==iid); l.updated = Date.now(); persist(); renderListe();
}
function editLI(lid, iid) {
  const l = S.liste.find(x => x.id===lid); if (!l) return;
  const it = l.items.find(x => x.id===iid); if (!it) return;
  const t = prompt('Modifica:', it.text);
  if (t !== null && t.trim()) { it.text = t.trim(); l.updated = Date.now(); persist(); renderListe(); }
}

function renderAll() { renderProms(); renderIdee(); renderListe(); }

// ── CRUD ───────────────────────────────────────────────────────────
function pinItem(id, tp) {
  const k = tp === 'prom' ? 'proms' : tp;
  const it = S[k].find(i => i.id===id); if (!it) return;
  it.pinned = !it.pinned; persist(); renderAll();
  toast(it.pinned ? 'Fissato' : 'Rimosso dai fissati');
}
function delItem(id, tp) {
  if (!confirm('Eliminare questo elemento?')) return;
  const k = tp === 'prom' ? 'proms' : tp;
  S[k] = S[k].filter(i => i.id!==id); persist(); renderAll();
}

// ── Modals ─────────────────────────────────────────────────────────
function openModal(id)        { document.getElementById(id).classList.add('open'); applyTwemoji(document.getElementById(id)); }
function closeModal(id)       { document.getElementById(id).classList.remove('open'); }
function bgClose(e, id)       { if (e.target === e.currentTarget) closeModal(id); }

// ── Card modal ─────────────────────────────────────────────────────
function openCardMod(tp, id) {
  eType = tp; eId = id || null;
  let ttl, hd = '', tx = '', clr = null;
  if (id) {
    const arr = tp === 'prom' ? S.proms : S.idee;
    const it = arr.find(i => i.id===id); if (!it) return;
    ttl = tp === 'prom' ? 'Modifica promemoria' : 'Modifica idea';
    hd = it.title||''; tx = it.text; clr = it.color;
  } else {
    ttl = tp === 'prom' ? 'Nuovo promemoria' : 'Nuova idea';
  }
  ePick = clr || null;
  document.getElementById('m-card-ttl').textContent = ttl;
  document.getElementById('m-card-hd').value = hd;
  document.getElementById('m-hd-wrap').style.display = tp === 'prom' ? 'none' : '';
  document.getElementById('m-card-tx').value = tx;
  buildClrPick('m-card-clr', ePick || 'none');
  openModal('m-card');
  setTimeout(() => document.getElementById('m-card-tx').focus(), 300);
}
function saveCard() {
  const tx = document.getElementById('m-card-tx').value.trim();
  if (!tx) { document.getElementById('m-card-tx').focus(); return; }
  const hd = document.getElementById('m-card-hd').value.trim();
  const now = Date.now();
  if (eId) {
    const arr = eType === 'prom' ? S.proms : S.idee;
    const it = arr.find(i => i.id===eId);
    if (it) { it.text = tx; it.title = hd; it.color = ePick; it.updated = now; }
  } else {
    const it = {id:uid(), text:tx, title:hd, color:ePick, pinned:false, done:false, created:now, updated:now};
    if (eType === 'prom') S.proms.unshift(it); else S.idee.unshift(it);
  }
  persist(); closeModal('m-card'); renderAll();
}

// ── Lista modal ────────────────────────────────────────────────────
function openListaMod(id) {
  eId = id || null; eType = 'liste';
  let nm = '', clr = null;
  if (id) {
    const l = S.liste.find(x => x.id===id);
    if (l) { nm = l.title; clr = l.color; }
    document.getElementById('m-lista-ttl').textContent = 'Rinomina lista';
  } else {
    document.getElementById('m-lista-ttl').textContent = 'Nuova lista';
  }
  ePick = clr || null;
  document.getElementById('m-lista-nm').value = nm;
  buildClrPick('m-lista-clr', ePick || 'none');
  openModal('m-lista');
  setTimeout(() => document.getElementById('m-lista-nm').focus(), 300);
}
function saveLista() {
  const nm = document.getElementById('m-lista-nm').value.trim();
  if (!nm) { document.getElementById('m-lista-nm').focus(); return; }
  const now = Date.now();
  if (eId) {
    const l = S.liste.find(x => x.id===eId);
    if (l) { l.title = nm; l.color = ePick; l.updated = now; }
  } else {
    S.liste.unshift({id:uid(), title:nm, items:[], color:ePick, pinned:false, created:now, updated:now});
  }
  persist(); closeModal('m-lista'); renderAll();
}

// ── FAB ────────────────────────────────────────────────────────────
function onFab() {
  if (curTab === 'prom')  openCardMod('prom');
  else if (curTab === 'idee') openCardMod('idee');
  else openListaMod();
}

// ── Import / Export ────────────────────────────────────────────────
function doExport() {
  const blob = new Blob([JSON.stringify(S, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'blocco-' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(a.href); closeModal('m-io'); toast('Backup esportato ✓');
}
function doImport(inp) {
  const f = inp.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (!confirm('Sovrascrivere i dati attuali con questo file?')) return;
      S = {name:d.name||'Marius', proms:d.proms||[], idee:d.idee||[], liste:d.liste||[], theme:d.theme||'dark'};
      persist(); applyTheme();
      document.getElementById('name-lbl').textContent = S.name;
      renderAll(); closeModal('m-io'); toast('Importato ✓');
    } catch { alert('File non valido'); }
  };
  r.readAsText(f); inp.value = '';
}

// ── Drag to reorder ────────────────────────────────────────────────
function initDrag(container, tp) {
  container.querySelectorAll('.card[data-id]').forEach(card => {
    let lt = null, dragging = false, ox = 0, oy = 0;
    card.addEventListener('touchstart', e => {
      if (e.target.closest('button,input,.lck,.pcb')) return;
      const t = e.touches[0]; ox = t.clientX; oy = t.clientY;
      lt = setTimeout(() => { dragging = true; startDrag(card, t); }, 420);
    }, {passive:true});
    card.addEventListener('touchmove', e => {
      if (lt) {
        const t = e.touches[0];
        if (Math.abs(t.clientX-ox) > 9 || Math.abs(t.clientY-oy) > 9) { clearTimeout(lt); lt = null; }
      }
      if (dragging) { e.preventDefault(); moveDrag(e.touches[0], container); }
    }, {passive:false});
    card.addEventListener('touchend', () => {
      if (lt) { clearTimeout(lt); lt = null; }
      if (dragging) { dragging = false; endDrag(container, tp); }
    }, {passive:true});
    card.addEventListener('touchcancel', () => {
      if (lt) { clearTimeout(lt); lt = null; }
      if (dragging) { dragging = false; cancelDrag(); }
    });
  });
}
function startDrag(card, t) {
  dSrcId = card.dataset.id; dOvId = null;
  const r = card.getBoundingClientRect();
  dGhost = card.cloneNode(true);
  dGhost.className = 'card drag-ghost';
  dGhost.style.cssText += `;width:${r.width}px;left:${r.left}px;top:${r.top}px`;
  document.body.appendChild(dGhost);
  card.classList.add('drag-src');
  if (navigator.vibrate) navigator.vibrate(40);
}
function moveDrag(t, container) {
  if (!dGhost || !dSrcId) return;
  dGhost.style.top = (t.clientY - 40) + 'px';
  dGhost.style.display = 'none';
  const hit = document.elementFromPoint(t.clientX, t.clientY);
  dGhost.style.display = '';
  const ov = hit?.closest('.card[data-id]');
  document.querySelectorAll('.drag-ov').forEach(c => c.classList.remove('drag-ov'));
  if (ov && ov.dataset.id !== dSrcId) { ov.classList.add('drag-ov'); dOvId = ov.dataset.id; }
}
function endDrag(container, tp) {
  if (dGhost) { dGhost.remove(); dGhost = null; }
  document.querySelectorAll('.drag-ov').forEach(c  => c.classList.remove('drag-ov'));
  document.querySelectorAll('.drag-src').forEach(c => c.classList.remove('drag-src'));
  if (dSrcId && dOvId && dSrcId !== dOvId) {
    const k   = tp === 'prom' ? 'proms' : tp;
    const arr = S[k];
    const fi  = arr.findIndex(i => i.id===dSrcId);
    const ti  = arr.findIndex(i => i.id===dOvId);
    if (fi !== -1 && ti !== -1) { const [it] = arr.splice(fi,1); arr.splice(ti,0,it); persist(); renderAll(); }
  }
  dSrcId = null; dOvId = null;
}
function cancelDrag() {
  if (dGhost) { dGhost.remove(); dGhost = null; }
  document.querySelectorAll('.drag-ov').forEach(c  => c.classList.remove('drag-ov'));
  document.querySelectorAll('.drag-src').forEach(c => c.classList.remove('drag-src'));
  dSrcId = null; dOvId = null;
}

// ── Service Worker ─────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./notes-sw.js').catch(() => {});
}

// ── Boot ───────────────────────────────────────────────────────────
applyTheme();
document.getElementById('name-lbl').textContent = S.name;
renderAll();
</script>
