<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" id="meta-theme" content="#ffffff">
  <title>Blocco</title>
  <link rel="manifest" href="./notes-manifest.json">
  <link rel="apple-touch-icon" href="./notes-icon.svg">
  <style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f4f4f5;--bg2:#ffffff;--card:#ffffff;--text:#18181b;--muted:#a1a1aa;
  --bd:#e4e4e7;--s1:#f4f4f5;--s2:#e4e4e7;--fab:#18181b;--fabc:#fff;
  --inp:#f4f4f5;--r:13px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shm:0 4px 14px rgba(0,0,0,.11);
}
[data-theme=dark]{
  --bg:#09090b;--bg2:#18181b;--card:#27272a;--text:#fafafa;--muted:#71717a;
  --bd:#3f3f46;--s1:#27272a;--s2:#3f3f46;--fab:#fafafa;--fabc:#18181b;
  --inp:#27272a;
  --sh:0 1px 3px rgba(0,0,0,.3);--shm:0 4px 14px rgba(0,0,0,.4);
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',system-ui,sans-serif;
  font-size:14px;background:var(--bg);color:var(--text);display:flex;flex-direction:column}

/* TOP BAR */
.top{display:flex;align-items:center;gap:10px;
  padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--bd);flex-shrink:0;
  padding-top:max(14px,calc(env(safe-area-inset-top)+8px))}
.welcome{font-size:17px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nametap{border-bottom:1.5px dashed var(--muted);cursor:pointer;padding-bottom:1px}
.topbtns{display:flex;gap:6px;flex-shrink:0}
.icobtn{width:36px;height:36px;border:none;background:var(--s1);border-radius:50%;
  cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;color:var(--text)}
.icobtn:active{background:var(--s2);transform:scale(.91)}

/* SEARCH */
.swrap{background:var(--bg2);border-bottom:1px solid var(--bd);
  max-height:0;overflow:hidden;transition:max-height .25s ease,padding .25s;
  padding:0 16px;flex-shrink:0}
.swrap.open{max-height:60px;padding:8px 16px}
.sinp{width:100%;border:1.5px solid var(--bd);border-radius:22px;
  padding:8px 16px;background:var(--inp);font-size:14px;color:var(--text);
  outline:none;font-family:inherit}
.sinp:focus{border-color:var(--muted)}

/* TABS */
.tabs{display:flex;background:var(--bg2);border-bottom:1.5px solid var(--bd);flex-shrink:0}
.tab{flex:1;border:none;background:none;padding:11px 0;font-size:13px;
  font-weight:500;color:var(--muted);cursor:pointer;position:relative;font-family:inherit}
.tab.on{color:var(--text)}
.tab.on::after{content:'';position:absolute;bottom:-1.5px;left:25%;right:25%;
  height:2px;background:var(--text);border-radius:2px}

/* VIEWS */
.views{flex:1;overflow:hidden;position:relative}
.view{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:14px 14px 110px;display:none}
.view.on{display:block}

/* CARDS */
.stack{display:flex;flex-direction:column;gap:10px}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);
  border:1px solid var(--bd);overflow:hidden;position:relative}
.card.pin::after{content:'📌';position:absolute;top:9px;right:10px;
  font-size:12px;pointer-events:none;opacity:.5}
.cclr{height:3px}
.cbody{padding:12px 13px 8px}
.ctitle{font-size:14px;font-weight:600;margin-bottom:3px}
.ctext{font-size:13.5px;line-height:1.55;white-space:pre-wrap;word-break:break-word}
.cts{font-size:10px;color:var(--muted);margin-top:7px}
.cbar{display:flex;gap:5px;padding:7px 10px 10px;border-top:1px solid var(--bd);flex-wrap:wrap}
.cbtn{font-size:11.5px;padding:4px 10px;border:1px solid var(--bd);border-radius:20px;
  background:none;cursor:pointer;color:var(--muted);font-family:inherit}
.cbtn:active{background:var(--s1)}

/* PROMEMORIA */
.prow{display:flex;align-items:flex-start;gap:12px;padding:12px 13px}
.pcb{width:22px;height:22px;border-radius:50%;border:2px solid var(--bd);
  flex-shrink:0;cursor:pointer;position:relative;background:transparent;margin-top:1px}
.pcb:active{background:var(--s1)}
.ptext{flex:1;font-size:13.5px;line-height:1.55;white-space:pre-wrap;word-break:break-word;cursor:pointer}

/* LISTA */
.lhead{padding:12px 13px 8px;display:flex;align-items:center;font-size:15px;font-weight:600;gap:6px}
.lprog{font-size:11px;color:var(--muted);font-weight:400;margin-left:auto}
.lrows{padding:0 13px 6px}
.lrow{display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid var(--bd)}
.lrow:last-child{border-bottom:none}
.lck{width:18px;height:18px;border:2px solid var(--bd);border-radius:5px;flex-shrink:0;
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;
  transition:background .15s,border-color .15s}
.lck.on{background:var(--text);border-color:var(--text);color:var(--fabc)}
.lit{flex:1;font-size:13px;cursor:pointer}
.lit.done{text-decoration:line-through;color:var(--muted)}
.ldel{background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;padding:0 2px;line-height:1}
.ladd{display:flex;gap:8px;padding:8px 13px 12px;border-top:1px solid var(--bd)}
.laddinp{flex:1;background:transparent;border:none;outline:none;font-size:13px;color:var(--text);font-family:inherit}
.laddinp::placeholder{color:var(--muted)}
.laddbtn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:20px;line-height:1}

/* FAB */
.fabwrap{position:fixed;bottom:max(20px,env(safe-area-inset-bottom));right:18px;
  z-index:60;display:flex;flex-direction:column;align-items:flex-end;gap:10px}
.fabitems{display:flex;flex-direction:column;align-items:flex-end;gap:8px;
  max-height:0;overflow:hidden;transition:max-height .3s ease}
.fabitems.on{max-height:220px}
.fabrow{display:flex;align-items:center;gap:10px;cursor:pointer;
  background:var(--card);border:1px solid var(--bd);border-radius:24px;
  padding:8px 16px 8px 12px;box-shadow:var(--shm);font-size:13px;white-space:nowrap}
.fabrow:active{background:var(--s1)}
.fabbtn{width:54px;height:54px;border-radius:50%;background:var(--fab);color:var(--fabc);
  border:none;font-size:26px;cursor:pointer;box-shadow:var(--shm);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:transform .2s}
.fabbtn:active{transform:scale(.88)}
.fabbtn.rot{transform:rotate(45deg)}

/* MODAL */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s}
.mov.on{opacity:1;pointer-events:auto}
.msheet{width:100%;max-width:600px;background:var(--bg2);border-radius:22px 22px 0 0;
  padding:16px 18px max(20px,env(safe-area-inset-bottom));
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);
  max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.mov.on .msheet{transform:none}
.mhndl{width:38px;height:4px;background:var(--bd);border-radius:2px;margin:0 auto 18px}
.mttl{font-size:16px;font-weight:600;margin-bottom:14px}
.minp{width:100%;background:var(--inp);border:1.5px solid var(--bd);border-radius:11px;
  padding:10px 13px;font-size:14px;color:var(--text);outline:none;
  font-family:inherit;resize:none}
.minp:focus{border-color:var(--muted)}
.msep{height:10px}
.mlbl{font-size:11px;color:var(--muted);margin-bottom:7px;margin-top:12px}
.mrow{display:flex;gap:10px;margin-top:16px}
.mcancel{flex:1;padding:12px;border-radius:11px;border:none;background:var(--s1);
  color:var(--text);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.msave{flex:1;padding:12px;border-radius:11px;border:none;background:var(--text);
  color:var(--bg2);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}

/* COLOR PICKER */
.clrpick{display:flex;gap:8px;flex-wrap:wrap}
.clrdot{width:28px;height:28px;border-radius:50%;cursor:pointer;
  border:3px solid transparent;transition:transform .15s}
.clrdot:active{transform:scale(.82)}
.clrdot.sel{border-color:var(--text)}
.clrnone{background:var(--s2);border:2px dashed var(--bd)}
.bg-red{background:#f87171}.bg-orange{background:#fb923c}
.bg-yellow{background:#facc15}.bg-green{background:#4ade80}
.bg-blue{background:#60a5fa}.bg-purple{background:#c084fc}

/* EMPTY */
.empty{text-align:center;color:var(--muted);padding:64px 20px 20px}
.empi{font-size:40px;display:block;margin-bottom:10px;opacity:.35}
.empt{font-size:13.5px;line-height:1.6}

/* DRAG */
.drag-ghost{position:fixed;z-index:400;pointer-events:none;opacity:.88;
  transform:scale(1.03) rotate(.4deg);box-shadow:0 8px 28px rgba(0,0,0,.22);
  border-radius:var(--r);overflow:hidden}
.drag-src{opacity:.22}
.drag-ov{outline:2px dashed var(--muted);outline-offset:3px}
  </style>
</head>
<body>

<div class="top">
  <div class="welcome">Benvenuto, <span class="nametap" id="name-lbl" onclick="editName()">Marius</span></div>
  <div class="topbtns">
    <button class="icobtn" onclick="toggleSearch()" title="Cerca">🔍</button>
    <button class="icobtn" id="theme-btn" onclick="toggleTheme()" title="Tema">☀️</button>
    <button class="icobtn" onclick="openModal('m-io')" title="Backup">💾</button>
  </div>
</div>

<div class="swrap" id="swrap">
  <input class="sinp" id="sinp" type="search" placeholder="Cerca in tutti i tuoi appunti..." oninput="doSearch(this.value)">
</div>

<div class="tabs">
  <button class="tab on" id="tab-prom" onclick="goTab('prom')">Promemoria</button>
  <button class="tab" id="tab-idee" onclick="goTab('idee')">Idee</button>
  <button class="tab" id="tab-liste" onclick="goTab('liste')">Liste</button>
</div>

<div class="views">
  <div class="view on" id="v-prom"><div class="stack" id="prom-l"></div></div>
  <div class="view" id="v-idee"><div class="stack" id="idee-l"></div></div>
  <div class="view" id="v-liste"><div class="stack" id="liste-l"></div></div>
</div>

<!-- FAB -->
<div class="fabwrap">
  <div class="fabitems" id="fabitems"></div>
  <button class="fabbtn" id="fabbtn" onclick="tglFab()">+</button>
</div>

<!-- Modal: card (prom / idea) -->
<div class="mov" id="m-card" onclick="bgClose(event,'m-card')">
  <div class="msheet">
    <div class="mhndl"></div>
    <div class="mttl" id="m-card-ttl">Nuovo</div>
    <input class="minp" id="m-card-hd" placeholder="Titolo (opzionale)...">
    <div class="msep"></div>
    <textarea class="minp" id="m-card-tx" rows="4" placeholder="Scrivi qui..."></textarea>
    <div class="mlbl">Colore etichetta</div>
    <div class="clrpick" id="m-card-clr"></div>
    <div class="mrow">
      <button class="mcancel" onclick="closeModal('m-card')">Annulla</button>
      <button class="msave" onclick="saveCard()">Salva</button>
    </div>
  </div>
</div>

<!-- Modal: lista -->
<div class="mov" id="m-lista" onclick="bgClose(event,'m-lista')">
  <div class="msheet">
    <div class="mhndl"></div>
    <div class="mttl" id="m-lista-ttl">Nuova lista</div>
    <input class="minp" id="m-lista-nm" placeholder="Nome lista...">
    <div class="mlbl">Colore etichetta</div>
    <div class="clrpick" id="m-lista-clr"></div>
    <div class="mrow">
      <button class="mcancel" onclick="closeModal('m-lista')">Annulla</button>
      <button class="msave" onclick="saveLista()">Salva</button>
    </div>
  </div>
</div>

<!-- Modal: backup -->
<div class="mov" id="m-io" onclick="bgClose(event,'m-io')">
  <div class="msheet">
    <div class="mhndl"></div>
    <div class="mttl">Backup dati</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button class="msave" style="width:100%" onclick="doExport()">📤 Esporta JSON</button>
      <button class="mcancel" style="width:100%" onclick="document.getElementById('f-in').click()">📥 Importa JSON</button>
      <input type="file" id="f-in" accept=".json" style="display:none" onchange="doImport(this)">
    </div>
    <div class="mrow">
      <button class="mcancel" style="width:100%" onclick="closeModal('m-io')">Chiudi</button>
    </div>
  </div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const CLRS = ['red','orange','yellow','green','blue','purple'];
const CLRHEX = {red:'#f87171',orange:'#fb923c',yellow:'#facc15',green:'#4ade80',blue:'#60a5fa',purple:'#c084fc'};

// ── State ──────────────────────────────────────────────────────────────────
let S = load();
let curTab = 'prom';
let q = '';
let eId = null, eType = null, ePick = null;
let dSrcId = null, dOvId = null, dGhost = null;

function load() {
  try {
    const d = JSON.parse(localStorage.getItem('blocco') || '{}');
    return {
      name: d.name || 'Marius',
      proms: d.proms || [],
      idee: d.idee || [],
      liste: d.liste || [],
      theme: d.theme || 'light'
    };
  } catch { return {name:'Marius',proms:[],idee:[],liste:[],theme:'light'}; }
}

function persist() { localStorage.setItem('blocco', JSON.stringify(S)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function fmtTs(t) {
  const diff = Date.now() - t;
  if (diff < 60e3) return 'adesso';
  if (diff < 3600e3) return Math.floor(diff/60e3) + 'm fa';
  if (diff < 86400e3) return Math.floor(diff/3600e3) + 'h fa';
  if (diff < 7*86400e3) return Math.floor(diff/86400e3) + 'g fa';
  return new Date(t).toLocaleDateString('it-IT', {day:'numeric', month:'short'});
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ── Theme ──────────────────────────────────────────────────────────────────
function applyTheme() {
  document.body.dataset.theme = S.theme;
  document.getElementById('theme-btn').textContent = S.theme === 'dark' ? '🌙' : '☀️';
  document.getElementById('meta-theme').content = S.theme === 'dark' ? '#09090b' : '#ffffff';
}
function toggleTheme() { S.theme = S.theme === 'dark' ? 'light' : 'dark'; persist(); applyTheme(); }

// ── Name ───────────────────────────────────────────────────────────────────
function editName() {
  const n = prompt('Il tuo nome:', S.name);
  if (n && n.trim()) {
    S.name = n.trim(); persist();
    document.getElementById('name-lbl').textContent = S.name;
  }
}

// ── Search ─────────────────────────────────────────────────────────────────
let sOpen = false;
function toggleSearch() {
  sOpen = !sOpen;
  document.getElementById('swrap').classList.toggle('open', sOpen);
  if (sOpen) setTimeout(() => document.getElementById('sinp').focus(), 260);
  else { document.getElementById('sinp').value = ''; q = ''; renderAll(); }
}
function doSearch(v) { q = v.toLowerCase().trim(); renderAll(); }
function matches(arr) { return !q || arr.some(s => s && s.toLowerCase().includes(q)); }

// ── Tabs ───────────────────────────────────────────────────────────────────
function goTab(t) {
  curTab = t;
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('on', b.id === 'tab-' + t));
  document.querySelectorAll('.view').forEach(v => v.classList.toggle('on', v.id === 'v-' + t));
  closeFab();
}

// ── Color helpers ──────────────────────────────────────────────────────────
function clrBar(c) { return c ? `<div class="cclr bg-${c}"></div>` : ''; }

function buildClrPick(elId, sel) {
  document.getElementById(elId).innerHTML = ['none', ...CLRS].map(c => `
    <div class="clrdot${c==='none'?' clrnone':''}${(sel||'none')===c?' sel':''}"
      style="${c!=='none' ? 'background:'+CLRHEX[c] : ''}"
      onclick="pickClr('${elId}','${c}')"></div>
  `).join('');
}
function pickClr(elId, c) { ePick = c === 'none' ? null : c; buildClrPick(elId, c); }

// ── Render: Promemoria ─────────────────────────────────────────────────────
function renderProms() {
  const el = document.getElementById('prom-l');
  let items = [...S.proms].sort((a,b) => (b.pinned?1:0)-(a.pinned?1:0) || b.created-a.created);
  if (q) items = items.filter(i => matches([i.text]));
  if (!items.length) {
    el.innerHTML = '<div class="empty"><span class="empi">📝</span><div class="empt">Nessun promemoria.<br>Usa + per aggiungerne uno.</div></div>';
    return;
  }
  el.innerHTML = items.map(i => `
    <div class="card${i.pinned?' pin':''}" data-id="${i.id}" data-tp="prom">
      ${clrBar(i.color)}
      <div class="prow">
        <div class="pcb" onclick="chkProm('${i.id}')"></div>
        <div class="ptext" onclick="openCardMod('prom','${i.id}')">${esc(i.text)}</div>
      </div>
      <div style="padding:0 13px 10px"><span class="cts">${fmtTs(i.updated||i.created)}</span></div>
      <div class="cbar">
        <button class="cbtn" onclick="pinItem('${i.id}','prom')">${i.pinned?'📌 Fissato':'📌 Fissa'}</button>
        <button class="cbtn" onclick="openCardMod('prom','${i.id}')">✏️ Modifica</button>
        <button class="cbtn" onclick="delItem('${i.id}','prom')">🗑 Elimina</button>
      </div>
    </div>
  `).join('');
  initDrag(el, 'prom');
}

function chkProm(id) {
  const card = document.querySelector(`[data-id="${id}"]`);
  if (!card) return;
  card.style.transition = 'opacity .35s ease,transform .35s ease';
  card.style.opacity = '0';
  card.style.transform = 'translateX(50px)';
  setTimeout(() => {
    S.proms = S.proms.filter(i => i.id !== id);
    persist(); renderProms();
  }, 360);
}

// ── Render: Idee ───────────────────────────────────────────────────────────
function renderIdee() {
  const el = document.getElementById('idee-l');
  let items = [...S.idee].sort((a,b) => (b.pinned?1:0)-(a.pinned?1:0) || b.created-a.created);
  if (q) items = items.filter(i => matches([i.title, i.text]));
  if (!items.length) {
    el.innerHTML = '<div class="empty"><span class="empi">💡</span><div class="empt">Nessuna idea.<br>Usa + per aggiungerne una.</div></div>';
    return;
  }
  el.innerHTML = items.map(i => `
    <div class="card${i.pinned?' pin':''}" data-id="${i.id}" data-tp="idee">
      ${clrBar(i.color)}
      <div class="cbody" onclick="openCardMod('idee','${i.id}')">
        ${i.title ? `<div class="ctitle">${esc(i.title)}</div>` : ''}
        <div class="ctext">${esc(i.text)}</div>
        <div class="cts">${fmtTs(i.updated||i.created)}</div>
      </div>
      <div class="cbar">
        <button class="cbtn" onclick="pinItem('${i.id}','idee')">${i.pinned?'📌 Fissato':'📌 Fissa'}</button>
        <button class="cbtn" onclick="openCardMod('idee','${i.id}')">✏️ Modifica</button>
        <button class="cbtn" onclick="delItem('${i.id}','idee')">🗑 Elimina</button>
      </div>
    </div>
  `).join('');
  initDrag(el, 'idee');
}

// ── Render: Liste ──────────────────────────────────────────────────────────
function renderListe() {
  const el = document.getElementById('liste-l');
  let items = [...S.liste].sort((a,b) => (b.pinned?1:0)-(a.pinned?1:0) || b.created-a.created);
  if (q) items = items.filter(i => matches([i.title, ...i.items.map(r => r.text)]));
  if (!items.length) {
    el.innerHTML = '<div class="empty"><span class="empi">📋</span><div class="empt">Nessuna lista.<br>Usa + per crearne una.</div></div>';
    return;
  }
  el.innerHTML = items.map(lst => {
    const done = lst.items.filter(r => r.done).length;
    return `
      <div class="card${lst.pinned?' pin':''}" data-id="${lst.id}" data-tp="liste">
        ${clrBar(lst.color)}
        <div class="lhead">${esc(lst.title)}<span class="lprog">${done}/${lst.items.length}</span></div>
        <div class="lrows">
          ${lst.items.map(r => `
            <div class="lrow">
              <div class="lck${r.done?' on':''}" onclick="tglLI('${lst.id}','${r.id}')">${r.done?'✓':''}</div>
              <span class="lit${r.done?' done':''}" onclick="editLI('${lst.id}','${r.id}')">${esc(r.text)}</span>
              <button class="ldel" onclick="delLI('${lst.id}','${r.id}')">×</button>
            </div>
          `).join('')}
        </div>
        <div class="ladd">
          <input class="laddinp" id="ladd-${lst.id}" placeholder="Aggiungi voce..."
            onkeydown="if(event.key==='Enter')addLI('${lst.id}',this)">
          <button class="laddbtn" onclick="addLI('${lst.id}',document.getElementById('ladd-${lst.id}'))">+</button>
        </div>
        <div class="cbar">
          <button class="cbtn" onclick="pinItem('${lst.id}','liste')">${lst.pinned?'📌 Fissato':'📌 Fissa'}</button>
          <button class="cbtn" onclick="openListaMod('${lst.id}')">✏️ Rinomina</button>
          <button class="cbtn" onclick="delItem('${lst.id}','liste')">🗑 Elimina</button>
        </div>
      </div>
    `;
  }).join('');
  initDrag(el, 'liste');
}

function tglLI(lid, iid) {
  const l = S.liste.find(x => x.id === lid); if (!l) return;
  const it = l.items.find(x => x.id === iid); if (!it) return;
  it.done = !it.done; l.updated = Date.now(); persist(); renderListe();
}
function addLI(lid, inp) {
  const t = inp.value.trim(); if (!t) return;
  const l = S.liste.find(x => x.id === lid); if (!l) return;
  l.items.push({id:uid(), text:t, done:false});
  l.updated = Date.now(); inp.value = ''; persist(); renderListe();
  setTimeout(() => { const ni = document.getElementById('ladd-'+lid); if (ni) ni.focus(); }, 50);
}
function delLI(lid, iid) {
  const l = S.liste.find(x => x.id === lid); if (!l) return;
  l.items = l.items.filter(i => i.id !== iid); l.updated = Date.now(); persist(); renderListe();
}
function editLI(lid, iid) {
  const l = S.liste.find(x => x.id === lid); if (!l) return;
  const it = l.items.find(x => x.id === iid); if (!it) return;
  const t = prompt('Modifica:', it.text);
  if (t !== null && t.trim()) { it.text = t.trim(); l.updated = Date.now(); persist(); renderListe(); }
}

function renderAll() { renderProms(); renderIdee(); renderListe(); }

// ── CRUD ───────────────────────────────────────────────────────────────────
function pinItem(id, tp) {
  const k = tp === 'prom' ? 'proms' : tp;
  const it = S[k].find(i => i.id === id); if (!it) return;
  it.pinned = !it.pinned; persist(); renderAll();
}
function delItem(id, tp) {
  if (!confirm('Eliminare?')) return;
  const k = tp === 'prom' ? 'proms' : tp;
  S[k] = S[k].filter(i => i.id !== id); persist(); renderAll();
}

// ── Modals ─────────────────────────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('on'); }
function closeModal(id) { document.getElementById(id).classList.remove('on'); }
function bgClose(e, id) { if (e.target === e.currentTarget) closeModal(id); }

// ── Card modal ─────────────────────────────────────────────────────────────
function openCardMod(tp, id) {
  eType = tp; eId = id || null;
  let ttl, hd = '', tx = '', clr = null;
  if (id) {
    const arr = tp === 'prom' ? S.proms : S.idee;
    const it = arr.find(i => i.id === id); if (!it) return;
    ttl = tp === 'prom' ? 'Modifica promemoria' : 'Modifica idea';
    hd = it.title || ''; tx = it.text; clr = it.color;
  } else {
    ttl = tp === 'prom' ? 'Nuovo promemoria' : 'Nuova idea';
  }
  ePick = clr || null;
  document.getElementById('m-card-ttl').textContent = ttl;
  document.getElementById('m-card-hd').value = hd;
  document.getElementById('m-card-hd').style.display = tp === 'prom' ? 'none' : '';
  document.getElementById('m-card-tx').value = tx;
  buildClrPick('m-card-clr', ePick || 'none');
  openModal('m-card');
  setTimeout(() => document.getElementById('m-card-tx').focus(), 300);
}

function saveCard() {
  const tx = document.getElementById('m-card-tx').value.trim();
  if (!tx) { document.getElementById('m-card-tx').focus(); return; }
  const hd = document.getElementById('m-card-hd').value.trim();
  const now = Date.now();
  if (eId) {
    const arr = eType === 'prom' ? S.proms : S.idee;
    const it = arr.find(i => i.id === eId);
    if (it) { it.text = tx; it.title = hd; it.color = ePick; it.updated = now; }
  } else {
    const it = {id:uid(), text:tx, title:hd, color:ePick, pinned:false, done:false, created:now, updated:now};
    if (eType === 'prom') S.proms.unshift(it); else S.idee.unshift(it);
  }
  persist(); closeModal('m-card'); renderAll();
}

// ── Lista modal ────────────────────────────────────────────────────────────
function openListaMod(id) {
  eId = id || null; eType = 'liste';
  let nm = '', clr = null;
  if (id) {
    const l = S.liste.find(x => x.id === id);
    if (l) { nm = l.title; clr = l.color; }
    document.getElementById('m-lista-ttl').textContent = 'Rinomina lista';
  } else {
    document.getElementById('m-lista-ttl').textContent = 'Nuova lista';
  }
  ePick = clr || null;
  document.getElementById('m-lista-nm').value = nm;
  buildClrPick('m-lista-clr', ePick || 'none');
  openModal('m-lista');
  setTimeout(() => document.getElementById('m-lista-nm').focus(), 300);
}

function saveLista() {
  const nm = document.getElementById('m-lista-nm').value.trim();
  if (!nm) { document.getElementById('m-lista-nm').focus(); return; }
  const now = Date.now();
  if (eId) {
    const l = S.liste.find(x => x.id === eId);
    if (l) { l.title = nm; l.color = ePick; l.updated = now; }
  } else {
    S.liste.unshift({id:uid(), title:nm, items:[], color:ePick, pinned:false, created:now, updated:now});
  }
  persist(); closeModal('m-lista'); renderAll();
}

// ── FAB ────────────────────────────────────────────────────────────────────
function tglFab() {
  const items = document.getElementById('fabitems');
  const btn = document.getElementById('fabbtn');
  if (items.classList.contains('on')) { closeFab(); return; }
  const opts = {
    prom: [{e:'📝', l:'Nuovo promemoria', fn:"openCardMod('prom')"}],
    idee: [{e:'💡', l:'Nuova idea',        fn:"openCardMod('idee')"}],
    liste:[{e:'📋', l:'Nuova lista',       fn:"openListaMod()"}]
  };
  items.innerHTML = (opts[curTab]||[]).map(o =>
    `<div class="fabrow" onclick="closeFab();${o.fn}">${o.e} ${o.l}</div>`
  ).join('');
  items.classList.add('on');
  btn.classList.add('rot');
}
function closeFab() {
  document.getElementById('fabitems').classList.remove('on');
  document.getElementById('fabbtn').classList.remove('rot');
}
document.addEventListener('click', e => { if (!e.target.closest('.fabwrap')) closeFab(); });

// ── Import / Export ────────────────────────────────────────────────────────
function doExport() {
  const blob = new Blob([JSON.stringify(S, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'blocco-' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(a.href); closeModal('m-io');
}
function doImport(inp) {
  const f = inp.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (!confirm('Sovrascrivere i dati attuali?')) return;
      S = {name:d.name||'Marius', proms:d.proms||[], idee:d.idee||[], liste:d.liste||[], theme:d.theme||'light'};
      persist(); applyTheme();
      document.getElementById('name-lbl').textContent = S.name;
      renderAll(); closeModal('m-io');
    } catch { alert('File non valido'); }
  };
  r.readAsText(f); inp.value = '';
}

// ── Drag to reorder ────────────────────────────────────────────────────────
function initDrag(container, tp) {
  container.querySelectorAll('.card[data-id]').forEach(card => {
    let lt = null, dragging = false, ox = 0, oy = 0;
    card.addEventListener('touchstart', e => {
      if (e.target.closest('button,input,.lck,.pcb')) return;
      const t = e.touches[0]; ox = t.clientX; oy = t.clientY;
      lt = setTimeout(() => { dragging = true; startDrag(card, t); }, 420);
    }, {passive:true});
    card.addEventListener('touchmove', e => {
      if (lt) {
        const t = e.touches[0];
        if (Math.abs(t.clientX-ox) > 9 || Math.abs(t.clientY-oy) > 9) { clearTimeout(lt); lt = null; }
      }
      if (dragging) { e.preventDefault(); moveDrag(e.touches[0], container); }
    }, {passive:false});
    card.addEventListener('touchend', () => {
      if (lt) { clearTimeout(lt); lt = null; }
      if (dragging) { dragging = false; endDrag(container, tp); }
    }, {passive:true});
    card.addEventListener('touchcancel', () => {
      if (lt) { clearTimeout(lt); lt = null; }
      if (dragging) { dragging = false; cancelDrag(); }
    });
  });
}

function startDrag(card, t) {
  dSrcId = card.dataset.id; dOvId = null;
  const r = card.getBoundingClientRect();
  dGhost = card.cloneNode(true);
  dGhost.className = 'card drag-ghost';
  dGhost.style.cssText += `;width:${r.width}px;left:${r.left}px;top:${r.top}px`;
  document.body.appendChild(dGhost);
  card.classList.add('drag-src');
  if (navigator.vibrate) navigator.vibrate(40);
}
function moveDrag(t, container) {
  if (!dGhost || !dSrcId) return;
  dGhost.style.top = (t.clientY - 40) + 'px';
  dGhost.style.display = 'none';
  const hit = document.elementFromPoint(t.clientX, t.clientY);
  dGhost.style.display = '';
  const ov = hit?.closest('.card[data-id]');
  document.querySelectorAll('.drag-ov').forEach(c => c.classList.remove('drag-ov'));
  if (ov && ov.dataset.id !== dSrcId) { ov.classList.add('drag-ov'); dOvId = ov.dataset.id; }
}
function endDrag(container, tp) {
  if (dGhost) { dGhost.remove(); dGhost = null; }
  document.querySelectorAll('.drag-ov').forEach(c => c.classList.remove('drag-ov'));
  document.querySelectorAll('.drag-src').forEach(c => c.classList.remove('drag-src'));
  if (dSrcId && dOvId && dSrcId !== dOvId) {
    const k = tp === 'prom' ? 'proms' : tp;
    const arr = S[k];
    const fi = arr.findIndex(i => i.id === dSrcId), ti = arr.findIndex(i => i.id === dOvId);
    if (fi !== -1 && ti !== -1) { const [it] = arr.splice(fi, 1); arr.splice(ti, 0, it); persist(); renderAll(); }
  }
  dSrcId = null; dOvId = null;
}
function cancelDrag() {
  if (dGhost) { dGhost.remove(); dGhost = null; }
  document.querySelectorAll('.drag-ov').forEach(c => c.classList.remove('drag-ov'));
  document.querySelectorAll('.drag-src').forEach(c => c.classList.remove('drag-src'));
  dSrcId = null; dOvId = null;
}

// ── Service Worker ─────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./notes-sw.js').catch(() => {});
}

// ── Boot ───────────────────────────────────────────────────────────────────
applyTheme();
document.getElementById('name-lbl').textContent = S.name;
renderAll();
</script>
